# dbt profiles — connection targets.
# Copy to ~/.dbt/profiles.yml or set DBT_PROFILES_DIR to this folder.
# Credentials come from environment variables so secrets never touch the repo.

legaldataplatform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'ldp_admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'ldp_dev_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'legaldata') }}"
      schema: dbt_dev
      threads: 4
      keepalives_idle: 0
      sslmode: prefer

    ci:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      user: ldp_admin
      password: ldp_dev_password
      dbname: legaldata_test
      schema: dbt_ci
      threads: 4

    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: dbt_prod
      threads: 8
      sslmode: require
