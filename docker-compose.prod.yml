# Production overlay for VPS deployment.
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - Caddy reverse proxy with automatic HTTPS
#   - UIs NOT exposed directly on host (only via Caddy on 443)
#   - Restart policy: always
#   - Resource limits set

services:
  postgres:
    restart: always
    ports: []   # do NOT expose to host; only accessible via Docker network
    deploy:
      resources:
        limits:
          memory: 2G

  pgbouncer:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    restart: always
    ports: []   # served via Caddy on minio.tudominio.com
    deploy:
      resources:
        limits:
          memory: 1G

  prefect:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 1G

  prometheus:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    restart: always
    ports: []
    environment:
      GF_SERVER_ROOT_URL: https://grafana.tudominio.com
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_in_env}
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Caddy reverse proxy with automatic HTTPS
  # -------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: ldp_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - ./infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docs:/srv/docs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - prefect
      - minio
      - grafana

volumes:
  caddy_data:
  caddy_config:
