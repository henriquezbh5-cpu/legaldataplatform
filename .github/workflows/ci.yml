name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src
        continue-on-error: true   # Mypy strict is aspirational; will tighten over time

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term --benchmark-disable

      - name: Run benchmarks (informational, does not fail CI)
        if: matrix.python-version == '3.11'
        run: pytest tests/unit/test_performance_benchmarks.py --benchmark-only --benchmark-columns=mean,stddev,ops --benchmark-sort=mean
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration tests (PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ldp_admin
          POSTGRES_PASSWORD: ldp_dev_password
          POSTGRES_DB: legaldata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: legaldata_test
      POSTGRES_USER: ldp_admin
      POSTGRES_PASSWORD: ldp_dev_password
      PGBOUNCER_HOST: localhost
      PGBOUNCER_PORT: 5432
      AWS_S3_ENDPOINT: http://localhost:9000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create required extensions
        run: |
          PGPASSWORD=ldp_dev_password psql -h localhost -U ldp_admin -d legaldata_test -c \
            "CREATE EXTENSION IF NOT EXISTS pgcrypto;
             CREATE EXTENSION IF NOT EXISTS pg_trgm;
             CREATE EXTENSION IF NOT EXISTS btree_gin;"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest tests/integration -v

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit (known CVEs in dependencies)
        run: pip-audit --strict
        continue-on-error: true

      - name: Bandit (static security analysis)
        run: bandit -r src -ll
        continue-on-error: true

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pipeline image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ldp-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dbt-validate:
    name: dbt parse + compile
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ldp_admin
          POSTGRES_PASSWORD: ldp_dev_password
          POSTGRES_DB: legaldata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: legaldata_test
      POSTGRES_USER: ldp_admin
      POSTGRES_PASSWORD: ldp_dev_password
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt + app deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dbt]"

      - name: Apply base migrations (provides sources)
        run: |
          PGPASSWORD=ldp_dev_password psql -h localhost -U ldp_admin -d legaldata_test -c \
            "CREATE EXTENSION IF NOT EXISTS pgcrypto;
             CREATE EXTENSION IF NOT EXISTS pg_trgm;
             CREATE EXTENSION IF NOT EXISTS btree_gin;"
          alembic upgrade head

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --target ci
        continue-on-error: true    # dbt_utils download can be flaky on forks

      - name: dbt parse (validates models + schema.yml)
        working-directory: dbt
        run: dbt parse --target ci
        continue-on-error: true

      - name: dbt compile (validates SQL compiles against schema)
        working-directory: dbt
        run: dbt compile --target ci
        continue-on-error: true
