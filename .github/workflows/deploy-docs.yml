name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/generate_pdfs.py'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown

      - name: Install Chromium (for PDF generation)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "LDP_BROWSER=$(which chromium-browser)" >> $GITHUB_ENV

      - name: Regenerate PDFs from Markdown
        run: python scripts/generate_pdfs.py
        continue-on-error: true

      - name: Prepare public directory
        run: |
          mkdir -p public
          cp -r docs/* public/
          # Make sure index.html is at the root
          if [ ! -f public/index.html ]; then
            echo "<meta http-equiv='refresh' content='0; url=presentacion-pro.html'>" > public/index.html
          fi
          ls -la public/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
