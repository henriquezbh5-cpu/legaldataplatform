site_name: LegalDataPlatform
site_description: ETL/ELT platform for legal and commercial data — technical documentation
site_author: Humberto Henriquez
site_url: https://henriquezbh5-cpu.github.io/legaldataplatform/
repo_url: https://github.com/henriquezbh5-cpu/legaldataplatform
repo_name: henriquezbh5-cpu/legaldataplatform
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Humberto Henriquez

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3
  - tables

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Pipelines: PIPELINES.md
  - PostgreSQL Optimization: POSTGRESQL_OPTIMIZATION.md
  - Data Quality: DATA_QUALITY.md
  - AWS Deployment: AWS_DEPLOYMENT.md
  - Talking Points: TALKING_POINTS.md
  - Walkthrough (full): WALKTHROUGH.md
  - Evidence:
      - Overview: evidence/README.md
      - Environment snapshot: evidence/env.md
      - Benchmarks: evidence/benchmarks.md
      - Flow summaries: evidence/flow_summary.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/henriquezbh5-cpu/legaldataplatform
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/
  version:
    provider: mike
